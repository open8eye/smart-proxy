<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="optionsTitle"></title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#4f46e5" width="36" height="36">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
      <div class="header-text">
        <h1 data-i18n="optionsTitle"></h1>
        <p class="header-subtitle" data-i18n="optionsSubtitle"></p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="general" data-i18n="generalSettings"></button>
      <button class="tab-btn" data-tab="statistics" data-i18n="usageStatistics"></button>
      <button class="tab-btn" data-tab="logs" data-i18n="logs"></button>
    </div>

    <!-- General Settings Tab -->
    <div id="tab-general" class="tab-content active">

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/>
        </svg>
        <h2 data-i18n="basicSettings"></h2>
      </div>
      <div class="card-body">
        <label class="checkbox-item">
          <input type="checkbox" id="startup-restore">
          <span data-i18n="startupRestore"></span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="quick-switch">
          <span data-i18n="quickSwitch"></span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="cascade-proxy">
          <span data-i18n="cascadeProxy"></span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="favorite-quick-proxy">
          <span data-i18n="favoriteQuickProxy"></span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <h2 data-i18n="bypassListTitle"></h2>
      </div>
      <div class="card-body">
        <label for="bypass-list" class="field-label" data-i18n="bypassListLabel"></label>
        <textarea id="bypass-list" rows="5" data-i18n-placeholder="bypassListPlaceholder"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/>
        </svg>
        <h2 data-i18n="proxyManagement"></h2>
      </div>
      <div class="card-body">
        <table id="proxies-table">
          <thead>
            <tr>
              <th data-i18n="tableName"></th>
              <th data-i18n="tableType"></th>
              <th data-i18n="tableHost"></th>
              <th data-i18n="tablePort"></th>
              <th data-i18n="tableUsername"></th>
              <th data-i18n="tableActions"></th>
            </tr>
          </thead>
          <tbody id="proxies-tbody"></tbody>
        </table>
        <div id="no-proxies" class="empty-state" data-i18n="noProxies"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
        </svg>
        <h2 data-i18n="favoritesManagement"></h2>
      </div>
      <div class="card-body">
        <div id="favorites-list" class="favorites-container"></div>
        <div id="no-favorites" class="empty-state" data-i18n="noFavorites"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 4c.46 0 .86.28 1.01.71l.02.06 1.45 5.26c.07.26.07.54 0 .8l-.02.06-1.45 5.26a1.15 1.15 0 01-1.01.77h-.04a1.15 1.15 0 01-1.01-.71l-.02-.06-1.45-5.26a1.5 1.5 0 010-.8l.02-.06L9.92 6.77A1.15 1.15 0 0110.93 6h.04c.24 0 .47.08.65.23.14.12.24.28.3.47l.08.01z"/>
        </svg>
        <h2 data-i18n="smartDomainsTitle"></h2>
      </div>
      <div class="card-body">
        <label for="smart-domains" class="field-label" data-i18n="smartDomainsLabel"></label>
        <textarea id="smart-domains" rows="6" data-i18n-placeholder="smartDomainsPlaceholder"></textarea>
      </div>
    </div>

    <!-- PAC脚本功能暂时屏蔽，待后续设计完善后再启用
    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
        </svg>
        <h2 data-i18n="pacScriptTitle"></h2>
      </div>
      <div class="card-body">
        <label for="pac-script" class="field-label" data-i18n="pacScriptLabel"></label>
        <textarea id="pac-script" rows="16" class="pac-script-area"></textarea>
        <button class="btn btn-primary" id="save-pac-btn" data-i18n="savePacScript" data-i18n-title="savePacScript"></button>
      </div>
    </div>
    -->

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
        </svg>
        <h2 data-i18n="languageSettings"></h2>
      </div>
      <div class="card-body">
        <label for="language-select" class="field-label" data-i18n="languageLabel"></label>
        <select id="language-select" data-i18n-title="languageLabel">
          <option value="zh_CN">简体中文</option>
          <option value="zh_TW">繁體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
        <h2 data-i18n="importExport"></h2>
      </div>
      <div class="card-body">
        <label for="import-export-data" class="field-label" data-i18n="importExportLabel"></label>
        <textarea id="import-export-data" rows="6" data-i18n-placeholder="importExportPlaceholder"></textarea>
        <div class="button-row">
          <button id="import-btn" class="btn btn-primary" data-i18n="importBtn" data-i18n-title="importBtn"></button>
          <button id="export-btn" class="btn btn-secondary" data-i18n="exportBtn" data-i18n-title="exportBtn"></button>
        </div>
      </div>
    </div>

    <div class="button-row button-row-main">
      <button id="reset-btn" class="btn btn-danger" data-i18n="resetBtn" data-i18n-title="resetBtn"></button>
      <button id="save-btn" class="btn btn-primary" data-i18n="saveBtn" data-i18n-title="saveBtn"></button>
    </div>

    <div id="status-message" class="status-message"></div>
    </div> <!-- End tab-general -->

    <!-- Statistics Tab -->
    <div id="tab-statistics" class="tab-content">
      <div class="card">
        <div class="card-header">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
          </svg>
          <h2 data-i18n="trafficStats"></h2>
        </div>
        <div class="card-body">
          <!-- Date Filter -->
          <div class="stats-filter">
            <button class="btn btn-sm active" data-period="day" data-i18n="today"></button>
            <button class="btn btn-sm" data-period="week" data-i18n="thisWeek"></button>
            <button class="btn btn-sm" data-period="month" data-i18n="thisMonth"></button>
            <button class="btn btn-sm" data-period="year" data-i18n="thisYear"></button>
          </div>

          <!-- Summary Cards -->
          <div class="stats-summary">
            <div class="summary-card">
              <div class="summary-value" id="total-download">0 B</div>
              <div class="summary-label" data-i18n="totalDownload"></div>
            </div>
            <div class="summary-card">
              <div class="summary-value" id="total-upload">0 B</div>
              <div class="summary-label" data-i18n="totalUpload"></div>
            </div>
            <div class="summary-card">
              <div class="summary-value" id="total-connections">0</div>
              <div class="summary-label" data-i18n="totalConnections"></div>
            </div>
            <div class="summary-card">
              <div class="summary-value" id="total-time">0s</div>
              <div class="summary-label" data-i18n="totalTime"></div>
            </div>
          </div>

          <div class="button-row">
            <button id="refresh-stats-btn" class="btn btn-primary" data-i18n="refreshStats"></button>
            <button id="clear-stats-btn" class="btn btn-danger" data-i18n="clearStats"></button>
          </div>
        </div>
      </div>
    </div>

    <!-- Logs Tab -->
    <div id="tab-logs" class="tab-content">
      <div class="card">
        <div class="card-header">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
          </svg>
          <h2 data-i18n="logs"></h2>
        </div>
        <div class="card-body">
          <div class="log-controls">
            <button id="refresh-log-btn" class="btn btn-primary" data-i18n="refreshLog"></button>
            <button id="clear-log-btn" class="btn btn-danger" data-i18n="clearLog"></button>
            <button id="export-log-btn-tab" class="btn btn-secondary" data-i18n="exportLog"></button>
          </div>
          <div class="log-container">
            <pre id="log-content" class="log-content"></pre>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div id="edit-proxy-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 data-i18n="editProxy"></h3>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-proxy-id">
        <div class="form-group">
          <label for="proxy-name" data-i18n="proxyName"></label>
          <input type="text" id="proxy-name" data-i18n-placeholder="proxyNamePlaceholder">
        </div>
        <div class="form-group">
          <label for="proxy-type" data-i18n="proxyType"></label>
          <select id="proxy-type" data-i18n-title="proxyType">
            <option value="http">HTTP</option>
            <option value="https">HTTPS</option>
            <option value="socks4">SOCKS4</option>
            <option value="socks5">SOCKS5</option>
          </select>
        </div>
        <div class="form-group">
          <label for="proxy-host" data-i18n="proxyHost"></label>
          <input type="text" id="proxy-host" data-i18n-placeholder="proxyHostPlaceholder">
        </div>
        <div class="form-group">
          <label for="proxy-port" data-i18n="proxyPort"></label>
          <input type="number" id="proxy-port" data-i18n-placeholder="proxyPortPlaceholder">
        </div>
        <div class="form-group">
          <label for="proxy-username" data-i18n="proxyUsername"></label>
          <input type="text" id="proxy-username" data-i18n-placeholder="proxyUsernamePlaceholder">
        </div>
        <div class="form-group">
          <label for="proxy-password" data-i18n="proxyPassword"></label>
          <input type="password" id="proxy-password" data-i18n-placeholder="proxyPasswordPlaceholder">
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancel-edit-btn" class="btn btn-secondary" data-i18n="cancelBtn" data-i18n-title="cancelBtn"></button>
        <button id="save-proxy-btn" class="btn btn-primary" data-i18n="saveProxyBtn" data-i18n-title="saveProxyBtn"></button>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
